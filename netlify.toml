# ─── The Digital Sanctuary — Netlify Configuration ───────────────────────────

[build]
  command   = "npm run build"
  publish   = ".next"

# Next.js on Netlify requires the official adapter plugin.
# Run once before deploying: npm install -D @netlify/plugin-nextjs
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─── Headers ─────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

